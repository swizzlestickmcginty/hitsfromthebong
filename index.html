<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>hitsfromthebong</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cossette+Titre&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
    }

    #slideshow {
      position: fixed;
      inset: 0;
    }

    .slide {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      display: none;
    }

    .slide.active { display: block; }

    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.25);
      pointer-events: none;
      z-index: 10;
    }

    #heading {
      position: fixed;
      z-index: 20;
      pointer-events: none;
      white-space: nowrap;
      top: 0; left: 0;
    }

    #heading h1 {
      font-family: 'Cossette Titre', serif;
      font-size: clamp(1.5rem, 13vw, 200px);
      font-weight: 400;
      color: #fff;
      line-height: 1;
      letter-spacing: -0.01em;
      text-shadow: 0 2px 60px rgba(0,0,0,0.4);
    }

    /* ── Mute button ───────────────────────────────────── */
    #mute-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 30;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(15, 15, 15, 0.55);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      box-shadow:
        0 4px 24px rgba(0,0,0,0.45),
        0 1px 0 rgba(255,255,255,0.08) inset,
        0 -1px 0 rgba(0,0,0,0.3) inset;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.15s;
      animation: liquid-pulse 2s ease-in-out infinite;
    }

    #mute-btn:hover {
      background: rgba(30, 30, 30, 0.7);
      transform: scale(1.06);
    }

    #mute-btn:active { transform: scale(0.95); }

    #mute-btn svg {
      width: 22px;
      height: 22px;
      color: #fff;
      flex-shrink: 0;
    }

    #mute-btn.unlocked {
      animation: none;
    }

    @keyframes liquid-pulse {
      0%   { box-shadow: 0 4px 24px rgba(0,0,0,0.45), 0 1px 0 rgba(255,255,255,0.08) inset, 0 0 0 0 rgba(255,255,255,0.35); }
      60%  { box-shadow: 0 4px 24px rgba(0,0,0,0.45), 0 1px 0 rgba(255,255,255,0.08) inset, 0 0 0 14px rgba(255,255,255,0); }
      100% { box-shadow: 0 4px 24px rgba(0,0,0,0.45), 0 1px 0 rgba(255,255,255,0.08) inset, 0 0 0 0 rgba(255,255,255,0); }
    }
  </style>
</head>
<body>

<div id="slideshow">
  <div class="slide active" style="background-image: url('images/1.gif');"></div>
  <div class="slide"        style="background-image: url('images/2.jpg');"></div>
  <div class="slide"        style="background-image: url('images/3.png');"></div>
  <div class="slide"        style="background-image: url('images/4.jpg');"></div>
  <div class="slide"        style="background-image: url('images/5.jpg');"></div>
  <div class="slide"        style="background-image: url('images/6.jpg');"></div>
  <div class="slide"        style="background-image: url('images/7.jpg');"></div>
  <div class="slide"        style="background-image: url('images/8.jpg');"></div>
  <div class="slide"        style="background-image: url('images/9.jpg');"></div>
</div>

<div id="overlay"></div>
<div id="heading"><h1>hitsfromthebong</h1></div>

<button id="mute-btn" aria-label="Unmute">
  <!-- Sound on icon -->
  <svg id="icon-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
    <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
    <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
  </svg>
  <!-- Muted icon (hidden by default) -->
  <svg id="icon-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
    <line x1="23" y1="9" x2="17" y2="15"/>
    <line x1="17" y1="9" x2="23" y2="15"/>
  </svg>
</button>

<script>
  // ── Slides ─────────────────────────────────────────────
  const slides = document.querySelectorAll('.slide');
  let slideIndex = 0;

  function nextSlide() {
    slides[slideIndex].classList.remove('active');
    slideIndex = (slideIndex + 1) % slides.length;
    slides[slideIndex].classList.add('active');
  }

  // ── Sounds ─────────────────────────────────────────────
  const sounds = [1,2,3,4,5,6,7,8,9].map(i => {
    const a = new Audio(`sounds/${i}.mp3`);
    a.preload = 'auto';
    return a;
  });
  let soundIndex = 0;
  let muted = true;
  let currentSound = null;

  function playNextSound() {
    if (currentSound) {
      currentSound.pause();
      currentSound.currentTime = 0;
    }
    currentSound = sounds[soundIndex % sounds.length];
    soundIndex++;
    currentSound.muted = muted;
    currentSound.currentTime = 0;
    currentSound.play().catch(() => {});
  }

  // Start playing immediately, muted — browsers allow muted autoplay
  playNextSound();

  const btn    = document.getElementById('mute-btn');
  const iconOn  = document.getElementById('icon-on');
  const iconOff = document.getElementById('icon-off');

  // Button starts showing muted icon + pulse, first click unmutes
  iconOn.style.display  = 'none';
  iconOff.style.display = '';

  btn.addEventListener('click', () => {
    muted = !muted;
    if (currentSound) currentSound.muted = muted;
    iconOn.style.display  = muted ? 'none' : '';
    iconOff.style.display = muted ? ''     : 'none';
    btn.setAttribute('aria-label', muted ? 'Unmute' : 'Mute');
    if (!muted) btn.classList.add('unlocked');
    else btn.classList.remove('unlocked');
  });

  // Called on every wall hit — advances both sound and bg in sync
  function onBounce() {
    nextSlide();
    playNextSound();
  }

  // ── DVD bounce ─────────────────────────────────────────
  const el = document.getElementById('heading');
  const SPEED = 3.5;
  let x, y, vx, vy;

  function init() {
    const maxX = window.innerWidth  - el.offsetWidth;
    const maxY = window.innerHeight - el.offsetHeight;
    x = Math.max(0, maxX / 2);
    y = Math.max(0, maxY / 2);
    vx = SPEED * (Math.random() < 0.5 ? 1 : -1);
    vy = SPEED * (Math.random() < 0.5 ? 1 : -1);
  }

  function bounce() {
    const maxX = window.innerWidth  - el.offsetWidth;
    const maxY = window.innerHeight - el.offsetHeight;

    x += vx;
    y += vy;

    if (x <= 0)      { x = 0;    vx = Math.abs(vx);  onBounce(); }
    if (x >= maxX)   { x = maxX; vx = -Math.abs(vx); onBounce(); }
    if (y <= 0)      { y = 0;    vy = Math.abs(vy);  onBounce(); }
    if (y >= maxY)   { y = maxY; vy = -Math.abs(vy); onBounce(); }

    el.style.transform = `translate(${x}px, ${y}px)`;
    requestAnimationFrame(bounce);
  }

  document.fonts.ready.then(() => {
    init();
    requestAnimationFrame(bounce);
  });

  window.addEventListener('resize', init);
</script>
</body>
</html>
