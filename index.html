<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>hitsfromthebong</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cossette+Titre&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
    }

    #slideshow {
      position: fixed;
      inset: 0;
    }

    .slide {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transform: scale(1.04);
      transition: opacity 1.2s ease-in-out, transform 8s ease-out;
      will-change: opacity, transform;
    }

    .slide.active {
      opacity: 1;
      transform: scale(1);
    }

    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.25);
      pointer-events: none;
      z-index: 10;
    }

    #heading {
      position: fixed;
      z-index: 20;
      pointer-events: none;
      white-space: nowrap;
      /* position set by JS */
      top: 0; left: 0;
    }

    #heading h1 {
      font-family: 'Cossette Titre', serif;
      font-size: clamp(1.5rem, 13vw, 200px);
      font-weight: 400;
      color: #fff;
      line-height: 1;
      letter-spacing: -0.01em;
      text-shadow: 0 2px 60px rgba(0,0,0,0.4);
    }
  </style>
</head>
<body>

<div id="slideshow">
  <div class="slide active" style="background-image: url('images/1.gif'); background-color: #1a1a2e;"></div>
  <div class="slide"        style="background-image: url('images/2.jpg'); background-color: #16213e;"></div>
  <div class="slide"        style="background-image: url('images/3.png'); background-color: #0f3460;"></div>
  <div class="slide"        style="background-image: url('images/4.jpg'); background-color: #1b1b2f;"></div>
  <div class="slide"        style="background-image: url('images/5.jpg'); background-color: #1a1a2e;"></div>
  <div class="slide"        style="background-image: url('images/6.jpg'); background-color: #16213e;"></div>
</div>

<div id="overlay"></div>

<div id="heading"><h1>hitsfromthebong</h1></div>

<script>
  // ── Slideshow ──────────────────────────────────────────
  const slides = document.querySelectorAll('.slide');
  let current = 0;

  function goTo(index) {
    slides[current].classList.remove('active');
    current = (index + slides.length) % slides.length;
    slides[current].classList.add('active');
  }

  setInterval(() => goTo(current + 1), 5000);

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goTo(current + 1);
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   goTo(current - 1);
  });

  let touchStartX = 0;
  document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
  document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 50) dx < 0 ? goTo(current + 1) : goTo(current - 1);
  });

  // ── Sounds ────────────────────────────────────────────
  const soundFiles = [1,2,3,4,5,6,7,8,9].map(i => {
    const a = new Audio(`sounds/${i}.mp3`);
    a.preload = 'auto';
    return a;
  });
  let soundIndex = 0;

  // Unlock audio on first user interaction (required by browsers)
  let audioUnlocked = false;
  function unlockAudio() {
    if (audioUnlocked) return;
    audioUnlocked = true;
    // Play and immediately pause each track to prime them
    soundFiles.forEach(a => { a.play().then(() => a.pause()).catch(() => {}); });
    // Play the first sound immediately
    soundFiles[0].currentTime = 0;
    soundFiles[0].play().catch(() => {});
    soundIndex = 1;
    document.removeEventListener('click', unlockAudio);
    document.removeEventListener('touchstart', unlockAudio);
    document.removeEventListener('keydown', unlockAudio);
  }
  document.addEventListener('click', unlockAudio);
  document.addEventListener('touchstart', unlockAudio);
  document.addEventListener('keydown', unlockAudio);

  function playNext() {
    if (!audioUnlocked) return;
    const s = soundFiles[soundIndex % soundFiles.length];
    s.currentTime = 0;
    s.play().catch(() => {});
    soundIndex++;
  }

  // ── DVD bounce ─────────────────────────────────────────
  const el = document.getElementById('heading');

  // Speed in px/frame — feels natural on both desktop and mobile
  const SPEED = 1.5;
  let x, y, vx, vy;

  function init() {
    // Measure element after fonts load
    const w = el.offsetWidth;
    const h = el.offsetHeight;
    const maxX = window.innerWidth  - w;
    const maxY = window.innerHeight - h;

    // Start roughly centred
    x = Math.max(0, maxX / 2);
    y = Math.max(0, maxY / 2);

    // Random diagonal direction
    vx = SPEED * (Math.random() < 0.5 ? 1 : -1);
    vy = SPEED * (Math.random() < 0.5 ? 1 : -1);
  }

  function bounce() {
    const w = el.offsetWidth;
    const h = el.offsetHeight;
    const maxX = window.innerWidth  - w;
    const maxY = window.innerHeight - h;

    x += vx;
    y += vy;

    if (x <= 0)      { x = 0;    vx = Math.abs(vx);  playNext(); }
    if (x >= maxX)   { x = maxX; vx = -Math.abs(vx); playNext(); }
    if (y <= 0)      { y = 0;    vy = Math.abs(vy);  playNext(); }
    if (y >= maxY)   { y = maxY; vy = -Math.abs(vy); playNext(); }

    el.style.transform = `translate(${x}px, ${y}px)`;
    requestAnimationFrame(bounce);
  }

  // Wait for font to load before measuring, then start
  document.fonts.ready.then(() => {
    init();
    requestAnimationFrame(bounce);
  });

  // Re-init on resize so bounds stay correct
  window.addEventListener('resize', init);
</script>
</body>
</html>
