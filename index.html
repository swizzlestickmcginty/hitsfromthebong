<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>hitsfromthebong</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cossette+Titre&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
    }

    #slideshow {
      position: fixed;
      inset: 0;
    }

    .slide {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      z-index: 0;
    }

    .slide.active { z-index: 1; }

    #loader {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 50;
      pointer-events: none;
    }

    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.25);
      pointer-events: none;
      z-index: 10;
    }

    /* ── Intro screen ──────────────────────────────────── */
    #intro {
      position: fixed;
      inset: 0;
      z-index: 25;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #play-btn {
      font-family: 'Cossette Titre', serif;
      font-size: clamp(1.7rem, 4vw, 2.2rem);
      letter-spacing: -0.01em;
      color: #fff;
      background: #000;
      border: none;
      padding: clamp(4px, 0.6vw, 7px) clamp(14px, 2vw, 24px);
      cursor: pointer;
      transition: background 0.25s, color 0.25s;
      -webkit-tap-highlight-color: transparent;
    }

    #play-btn.inverted {
      background: #fff;
      color: #000;
    }

    /* ── Bouncing heading ──────────────────────────────── */
    #heading {
      position: fixed;
      z-index: 20;
      pointer-events: none;
      white-space: nowrap;
      top: 0; left: 0;
      display: none;
      will-change: transform;
    }

    #heading h1 {
      font-family: 'Cossette Titre', serif;
      font-size: clamp(1.5rem, 13vw, 200px);
      font-weight: 400;
      color: #fff;
      line-height: 1;
      letter-spacing: -0.01em;
      text-shadow: 0 2px 60px rgba(0,0,0,0.4);
    }
  </style>
</head>
<body>

<div id="slideshow">
  <div class="slide active" data-bg="images/1.gif"></div>
  <div class="slide"        data-bg="images/2.jpg"></div>
  <div class="slide"        data-bg="images/3.gif"></div>
  <div class="slide"        data-bg="images/4.jpg"></div>
  <div class="slide"        data-bg="images/5.jpg"></div>
  <div class="slide"        data-bg="images/6.jpg"></div>
  <div class="slide"        data-bg="images/7.png"></div>
  <div class="slide"        data-bg="images/8.jpg"></div>
  <div class="slide"        data-bg="images/9.jpg"></div>
</div>

<!-- Black screen until first image is ready -->
<div id="loader"></div>

<div id="overlay"></div>

<div id="intro">
  <button id="play-btn"><span>PLAY</span></button>
</div>

<div id="heading"><h1>hitsfromthebong</h1></div>

<script>
  // ── Slides ─────────────────────────────────────────────
  const slides = document.querySelectorAll('.slide');
  const loader = document.getElementById('loader');
  let slideIndex = 0;

  function loadSlide(index) {
    const s = slides[index];
    if (!s.style.backgroundImage) {
      s.style.backgroundImage = `url('${s.dataset.bg}')`;
    }
  }

  function preloadNext(index) {
    const next = (index + 1) % slides.length;
    loadSlide(next);
  }

  // Load first slide, hide loader once it's ready
  loadSlide(0);
  const firstImg = new Image();
  firstImg.onload = () => { loader.style.display = 'none'; };
  firstImg.src = slides[0].dataset.bg;

  function nextSlide() {
    slides[slideIndex].classList.remove('active');
    slideIndex = (slideIndex + 1) % slides.length;
    loadSlide(slideIndex);
    slides[slideIndex].classList.add('active');
    preloadNext(slideIndex);
  }

  // ── Audio — single element, swap src per track ──────────
  // iOS Safari only unlocks the specific Audio object played
  // during a user gesture. One element avoids that constraint.
  const trackSrcs = [1,2,3,4,5,6,7,8,9].map(i => `sounds/${i}.mp3`);
  const audio = new Audio();
  audio.preload = 'none';
  let soundIndex = 0;

  function playNextSound() {
    audio.pause();
    audio.src = trackSrcs[soundIndex % trackSrcs.length];
    soundIndex++;
    audio.currentTime = 0;
    audio.play().catch(() => {});
  }

  // Pause when phone locks / tab hidden, resume on return
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      audio.pause();
    } else if (bouncing) {
      audio.play().catch(() => {});
    }
  });

  // ── DVD bounce ─────────────────────────────────────────
  const el = document.getElementById('heading');
  const SPEED = window.innerWidth < 768 ? 3.5 * 0.7 : 3.5;
  let x, y, vx, vy;
  let bouncing = false;
  // Cache dimensions — only remeasure on resize, not every frame
  let elW = 0, elH = 0;

  function initBounce() {
    elW = el.offsetWidth;
    elH = el.offsetHeight;
    const maxX = window.innerWidth  - elW;
    const maxY = window.innerHeight - elH;
    x = Math.max(0, maxX / 2);
    y = Math.max(0, maxY / 2);
    vx = SPEED * (Math.random() < 0.5 ? 1 : -1);
    vy = SPEED * (Math.random() < 0.5 ? 1 : -1);
    el.style.transform = `translate3d(${x}px, ${y}px, 0)`;
  }

  function bounce() {
    if (!bouncing) return;
    // Re-measure every frame in case font loaded late and changed dimensions
    elW = el.offsetWidth;
    elH = el.offsetHeight;
    const maxX = Math.max(0, window.innerWidth  - elW);
    const maxY = Math.max(0, window.innerHeight - elH);

    x += vx;
    y += vy;

    if (x <= 0)    { x = 0;    vx = Math.abs(vx);  onBounce(); }
    if (x >= maxX) { x = maxX; vx = -Math.abs(vx); onBounce(); }
    if (y <= 0)    { y = 0;    vy = Math.abs(vy);  onBounce(); }
    if (y >= maxY) { y = maxY; vy = -Math.abs(vy); onBounce(); }

    // Clamp position to always stay in bounds
    x = Math.min(Math.max(0, x), maxX);
    y = Math.min(Math.max(0, y), maxY);

    el.style.transform = `translate3d(${x}px, ${y}px, 0)`;
    requestAnimationFrame(bounce);
  }

  function onBounce() {
    nextSlide();
    playNextSound();
  }

  window.addEventListener('resize', () => {
    elW = el.offsetWidth;
    elH = el.offsetHeight;
    if (bouncing) initBounce();
  });

  // ── PLAY button ─────────────────────────────────────────
  const intro   = document.getElementById('intro');
  const playBtn = document.getElementById('play-btn');

  document.fonts.ready.then(() => {
    // Pre-measure while hidden so initBounce() is accurate on click
    el.style.visibility = 'hidden';
    el.style.display    = 'block';
    elW = el.offsetWidth;
    elH = el.offsetHeight;
    el.style.display    = 'none';
    el.style.visibility = '';

    playBtn.addEventListener('click', () => {
      playBtn.classList.add('inverted');

      // Play audio synchronously inside the gesture — iOS requires this
      playNextSound();

      // Small visual pause for the invert, then cut to bounce
      setTimeout(() => {
        intro.style.display = 'none';
        initBounce();
        el.style.display = 'block';
        bouncing = true;
        requestAnimationFrame(bounce);
      }, 200);
    });
  });
</script>
</body>
</html>
