<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>hitsfromthebong</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cossette+Titre&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
    }

    #slideshow {
      position: fixed;
      inset: 0;
    }

    .slide {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      z-index: 0;
    }

    .slide.active { z-index: 1; }

    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.25);
      pointer-events: none;
      z-index: 10;
    }

    /* ── Intro screen ──────────────────────────────────── */
    #intro {
      position: fixed;
      inset: 0;
      z-index: 25;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(16px, 3vw, 32px);
      transition: opacity 0.4s ease;
    }

    #intro h1 {
      font-family: 'Cossette Titre', serif;
      font-size: clamp(1.5rem, 13vw, 200px);
      font-weight: 400;
      color: #fff;
      line-height: 1;
      letter-spacing: -0.01em;
      text-align: center;
      padding: 0 4vw;
    }

    #play-btn {
      font-family: 'Cossette Titre', serif;
      font-size: clamp(1.7rem, 4vw, 2.2rem);
      letter-spacing: -0.01em;
      color: #fff;
      background: #000;
      border: none;
      padding: clamp(4px, 0.6vw, 7px) clamp(14px, 2vw, 24px);
      cursor: pointer;
      transition: background 0.25s, color 0.25s;
    }

    #play-btn.inverted {
      background: #fff;
      color: #000;
    }

    /* ── Bouncing heading ──────────────────────────────── */
    #heading {
      position: fixed;
      z-index: 20;
      pointer-events: none;
      white-space: nowrap;
      top: 0; left: 0;
      display: none;
    }

    #heading h1 {
      font-family: 'Cossette Titre', serif;
      font-size: clamp(1.5rem, 13vw, 200px);
      font-weight: 400;
      color: #fff;
      line-height: 1;
      letter-spacing: -0.01em;
      text-shadow: 0 2px 60px rgba(0,0,0,0.4);
    }

  </style>
</head>
<body>

<div id="slideshow">
  <div class="slide active" style="background-image: url('images/1.gif');"></div>
  <div class="slide"        style="background-image: url('images/2.jpg');"></div>
  <div class="slide"        style="background-image: url('images/3.png');"></div>
  <div class="slide"        style="background-image: url('images/4.jpg');"></div>
  <div class="slide"        style="background-image: url('images/5.jpg');"></div>
  <div class="slide"        style="background-image: url('images/6.jpg');"></div>
  <div class="slide"        style="background-image: url('images/7.jpg');"></div>
  <div class="slide"        style="background-image: url('images/8.jpg');"></div>
  <div class="slide"        style="background-image: url('images/9.jpg');"></div>
</div>

<div id="overlay"></div>

<div id="intro">
  <button id="play-btn"><span>PLAY</span></button>
</div>

<div id="heading"><h1>hitsfromthebong</h1></div>


<script>
  // ── Slides ─────────────────────────────────────────────
  const slides = document.querySelectorAll('.slide');
  let slideIndex = 0;

  function nextSlide() {
    slides[slideIndex].classList.remove('active');
    slideIndex = (slideIndex + 1) % slides.length;
    slides[slideIndex].classList.add('active');
  }

  // ── Sounds ─────────────────────────────────────────────
  const sounds = [1,2,3,4,5,6,7,8,9].map(i => {
    const a = new Audio(`sounds/${i}.mp3`);
    a.preload = 'auto';
    return a;
  });
  let soundIndex = 0;
  let muted = false;
  let currentSound = null;

  function playNextSound() {
    if (currentSound) {
      currentSound.pause();
      currentSound.currentTime = 0;
    }
    currentSound = sounds[soundIndex % sounds.length];
    soundIndex++;
    currentSound.muted = muted;
    currentSound.currentTime = 0;
    currentSound.play().catch(() => {});
  }


  // ── DVD bounce ─────────────────────────────────────────
  const el = document.getElementById('heading');
  const SPEED = window.innerWidth < 768 ? 3.5 * 0.7 : 3.5;
  let x, y, vx, vy;
  let bouncing = false;

  function initBounce() {
    const maxX = window.innerWidth  - el.offsetWidth;
    const maxY = window.innerHeight - el.offsetHeight;
    x = Math.max(0, maxX / 2);
    y = Math.max(0, maxY / 2);
    vx = SPEED * (Math.random() < 0.5 ? 1 : -1);
    vy = SPEED * (Math.random() < 0.5 ? 1 : -1);
    el.style.transform = `translate(${x}px, ${y}px)`;
  }

  function bounce() {
    if (!bouncing) return;
    const maxX = window.innerWidth  - el.offsetWidth;
    const maxY = window.innerHeight - el.offsetHeight;

    x += vx;
    y += vy;

    if (x <= 0)      { x = 0;    vx = Math.abs(vx);  onBounce(); }
    if (x >= maxX)   { x = maxX; vx = -Math.abs(vx); onBounce(); }
    if (y <= 0)      { y = 0;    vy = Math.abs(vy);  onBounce(); }
    if (y >= maxY)   { y = maxY; vy = -Math.abs(vy); onBounce(); }

    el.style.transform = `translate(${x}px, ${y}px)`;
    requestAnimationFrame(bounce);
  }

  function onBounce() {
    nextSlide();
    playNextSound();
  }

  window.addEventListener('resize', () => { if (bouncing) initBounce(); });

  // ── PLAY button ─────────────────────────────────────────
  const intro   = document.getElementById('intro');
  const playBtn = document.getElementById('play-btn');

  document.fonts.ready.then(() => {
    initBounce(); // pre-measure so bounce starts from centre instantly

    playBtn.addEventListener('click', () => {
      playBtn.classList.add('inverted');

      setTimeout(() => {
        // Instantly hide intro, instantly show text
        intro.style.display = 'none';
        initBounce();
        el.style.display = 'block';

        // Start audio immediately (user gesture just happened)
        playNextSound();

        // Start bounce
        bouncing = true;
        requestAnimationFrame(bounce);
      }, 250);
    });
  });
</script>
</body>
</html>
