<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>hitsfromthebong</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cossette+Titre&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
    }

    #slideshow {
      position: fixed;
      inset: 0;
    }

    .slide {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      display: none;
    }

    .slide.active {
      display: block;
    }

    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.25);
      pointer-events: none;
      z-index: 10;
    }

    #heading {
      position: fixed;
      z-index: 20;
      pointer-events: none;
      white-space: nowrap;
      top: 0; left: 0;
    }

    #heading h1 {
      font-family: 'Cossette Titre', serif;
      font-size: clamp(1.5rem, 13vw, 200px);
      font-weight: 400;
      color: #fff;
      line-height: 1;
      letter-spacing: -0.01em;
      text-shadow: 0 2px 60px rgba(0,0,0,0.4);
    }
  </style>
</head>
<body>

<div id="slideshow">
  <div class="slide active" style="background-image: url('images/1.gif');"></div>
  <div class="slide"        style="background-image: url('images/2.jpg');"></div>
  <div class="slide"        style="background-image: url('images/3.png');"></div>
  <div class="slide"        style="background-image: url('images/4.jpg');"></div>
  <div class="slide"        style="background-image: url('images/5.jpg');"></div>
  <div class="slide"        style="background-image: url('images/6.jpg');"></div>
  <div class="slide"        style="background-image: url('images/7.jpg');"></div>
  <div class="slide"        style="background-image: url('images/8.jpg');"></div>
  <div class="slide"        style="background-image: url('images/9.jpg');"></div>
</div>

<div id="overlay"></div>
<div id="heading"><h1>hitsfromthebong</h1></div>

<script>
  // ── Slides ─────────────────────────────────────────────
  const slides = document.querySelectorAll('.slide');
  let slideIndex = 0;

  function nextSlide() {
    slides[slideIndex].classList.remove('active');
    slideIndex = (slideIndex + 1) % slides.length;
    slides[slideIndex].classList.add('active');
  }

  // ── Sounds ─────────────────────────────────────────────
  const sounds = [1,2,3,4,5,6,7,8,9].map(i => {
    const a = new Audio(`sounds/${i}.mp3`);
    a.preload = 'auto';
    return a;
  });
  let soundIndex = 0;
  let audioUnlocked = false;

  function unlockAudio() {
    if (audioUnlocked) return;
    audioUnlocked = true;
    sounds.forEach(a => { a.play().then(() => a.pause()).catch(() => {}); });
    sounds[0].currentTime = 0;
    sounds[0].play().catch(() => {});
    soundIndex = 1;
    document.removeEventListener('click', unlockAudio);
    document.removeEventListener('touchstart', unlockAudio);
    document.removeEventListener('keydown', unlockAudio);
  }
  document.addEventListener('click', unlockAudio);
  document.addEventListener('touchstart', unlockAudio);
  document.addEventListener('keydown', unlockAudio);

  // Called on every wall hit — advances both sound and bg in sync
  function onBounce() {
    nextSlide();
    if (!audioUnlocked) return;
    const s = sounds[soundIndex % sounds.length];
    s.currentTime = 0;
    s.play().catch(() => {});
    soundIndex++;
  }

  // ── DVD bounce ─────────────────────────────────────────
  const el = document.getElementById('heading');
  const SPEED = 1.5;
  let x, y, vx, vy;

  function init() {
    const maxX = window.innerWidth  - el.offsetWidth;
    const maxY = window.innerHeight - el.offsetHeight;
    x = Math.max(0, maxX / 2);
    y = Math.max(0, maxY / 2);
    vx = SPEED * (Math.random() < 0.5 ? 1 : -1);
    vy = SPEED * (Math.random() < 0.5 ? 1 : -1);
  }

  function bounce() {
    const maxX = window.innerWidth  - el.offsetWidth;
    const maxY = window.innerHeight - el.offsetHeight;

    x += vx;
    y += vy;

    if (x <= 0)      { x = 0;    vx = Math.abs(vx);  onBounce(); }
    if (x >= maxX)   { x = maxX; vx = -Math.abs(vx); onBounce(); }
    if (y <= 0)      { y = 0;    vy = Math.abs(vy);  onBounce(); }
    if (y >= maxY)   { y = maxY; vy = -Math.abs(vy); onBounce(); }

    el.style.transform = `translate(${x}px, ${y}px)`;
    requestAnimationFrame(bounce);
  }

  document.fonts.ready.then(() => {
    init();
    requestAnimationFrame(bounce);
  });

  window.addEventListener('resize', init);
</script>
</body>
</html>
